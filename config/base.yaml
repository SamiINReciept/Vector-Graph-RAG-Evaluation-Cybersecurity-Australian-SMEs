experiment_name: base

data:
  pdf_dir: data/pdfs
  corpus_cache: data/corpus.pkl

chunking:
  chunk_size: 1000
  chunk_overlap: 150

embedding:
  model_name: BAAI/bge-m3
  batch_size: 16
  device: cuda

llm:
  # We'll override this per-model in other configs
  model_name: meta-llama/Meta-Llama-3.1-8B-Instruct
  # model_name: mistralai/Mistral-7B-Instruct-v0.3
  # model_name: Qwen/Qwen3-8B
  dtype: bfloat16        # or float16 if bfloat16 complains
  device_map: auto
  max_new_tokens: 512
  temperature: 0.1
  # temperature: 0.0 # <- greedy, much less repetition
  top_p: 0.9
  # top_p: 1.0
# And in our RAG prompt we’ll add:
# “Answer in English. Provide one concise answer.”
# That alone cuts most of the weird looping.

vector_store:
  type: chromadb
  persist_dir: data/vector_store

graph:
  neo4j_uri: bolt://localhost:7687
  neo4j_user: neo4j
  neo4j_password: password

ragas:
  # we’ll pick a specific open-source model later, this is just a placeholder
  judge_model_name: meta-llama/Meta-Llama-3.1-8B-Instruct
